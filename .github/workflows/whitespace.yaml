name: Whitespace

on:
  pull_request:
    branches:
      - 'main'
      - 'release-*'

permissions: {}

jobs:

  whitespace:
    name: Check Whitespace
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: chainguard-dev/actions/trailing-space@05fbd381f7c158bd33c9bbf3a28f67852269fdf8 # v1.6.21
        if: ${{ always() }}

      - uses: chainguard-dev/actions/eof-newline@05fbd381f7c158bd33c9bbf3a28f67852269fdf8 # v1.6.21
        if: ${{ always() }}
